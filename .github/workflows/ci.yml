name: CI Pipeline

on:
  push:
    branches: ["main", "feature/notebook", "feature/tests"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependancies
        run:  |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Verify that the files exist
        run: |
          ls -la
          echo "Pipeline CI OK ✅"

      - name: Run tests
        run: |
          pytest tests/test_model.py
        env:
          ENV: test


  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to Hugging Face Spaces
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git config --global user.email "ci@github.com"
          git config --global user.name "GitHub Actions"

          git clone https://huggingface.co/spaces/elch99/projet5 hf-space

          rm -rf hf-space/*

          rsync -av \
            --exclude='.git' \
            --exclude='hf-space' \
            ./ hf-space/


          cd hf-space
          git add .
          git commit -m "Deploy from GitHub Actions"
          git push https://user:$HF_TOKEN@huggingface.co/spaces/elch99/projet5